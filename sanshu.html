  {id:"br_oma",name:"大間崎（青森）",lat:41.5500,lon:140.9000,cat:"岬",myth:"[語源]大間（広い間）崎。本州最北端。津軽海峡の東口。蝦夷と本州の境界の最前線。"},
  {id:"br_okinoshima",name:"沖ノ島（福岡）",lat:34.2333,lon:130.1000,cat:"岬",myth:"[記紀]「海の正倉院」。宗像大社の沖津宮。女人禁制。大陸との交流の最前線。"},

// 全データ統合
const ALL=[...FIXED,...SV,...MOUNTAINS,...SHRINES,...KOFUN,...RUINS,...RIVERS,...LAKES,...BARRIERS];

const CATS=[
  {key:"聖地",label:"⛩ 聖地",  color:"#fbbf24"},
  {key:"SV",  label:"🏛 SV",   color:"#60a5fa"},
  {key:"山",  label:"🗻 山",   color:"#4ade80"},
  {key:"神社",label:"⛩ 神社", color:"#fb923c"},
  {key:"古墳",label:"🏔 古墳", color:"#c084fc"},
  {key:"遺跡",label:"🪨 遺跡", color:"#94a3b8"},
  {key:"川",  label:"🌊 川",   color:"#38bdf8"},
  {key:"湖",  label:"💧 湖",   color:"#818cf8"},
  {key:"関",  label:"🚧 関",   color:"#f43f5e"},
  {key:"峠",  label:"⛰ 峠",   color:"#f97316"},
  {key:"岬",  label:"🌊 岬",   color:"#2dd4bf"},
];

// 計算
const DEG=Math.PI/180;
const brng=(a,b,c,d)=>{const[f1,f2,l1,l2]=[a,c,b,d].map(x=>x*DEG),dl=l2-l1,x=Math.sin(dl)*Math.cos(f2),y=Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl);return((Math.atan2(x,y)/DEG)+360)%360;};
const dkm=(a,b,c,d)=>{const R=6371,[f1,f2,l1,l2]=[a,c,b,d].map(x=>x*DEG),e=Math.sin((f2-f1)/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin((l2-l1)/2)**2;return R*2*Math.asin(Math.sqrt(e));};
const ctr=pts=>{const s=pts.map(([a,b])=>{const f=a*DEG,l=b*DEG;return[Math.cos(f)*Math.cos(l),Math.cos(f)*Math.sin(l),Math.sin(f)];});const[cx,cy,cz]=s.reduce(([ax,ay,az],[x,y,z])=>[ax+x,ay+y,az+z],[0,0,0]).map(v=>v/s.length);return{lat:Math.atan2(cz,Math.sqrt(cx**2+cy**2))/DEG,lon:Math.atan2(cy,cx)/DEG};};
const d16=d=>{const D=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"],i=Math.round(d/22.5)%16;let e=Math.abs(d-i*22.5);if(e>180)e=360-e;return{dir:D[i],err:e};};

const SYMS=["勾玉","鏡","剣"];
const SS={"勾玉":{bg:"#4ade80",txt:"#14532d",em:"🌿"},"鏡":{bg:"#60a5fa",txt:"#1e3a5f",em:"🔵"},"剣":{bg:"#f87171",txt:"#7f1d1d",em:"⚔️"}};

function App(){
  const[slots,setSlots]=useState({勾玉:"amagi",鏡:"motomiya",剣:"fugen"});
  const[result,setResult]=useState(null);
  const[active,setActive]=useState(null);
  const[q,setQ]=useState("");
  const[tab,setTab]=useState("SV");

  const get=id=>ALL.find(s=>s.id===id);

  useEffect(()=>{
    const pts=SYMS.map(s=>get(slots[s])).filter(Boolean);
    if(pts.length<3)return;
    const c=ctr(pts.map(s=>[s.lat,s.lon]));
    const edges=[[pts[0],pts[1]],[pts[1],pts[2]],[pts[2],pts[0]]].map(([a,b])=>({from:a.name,to:b.name,b:brng(a.lat,a.lon,b.lat,b.lon),d:dkm(a.lat,a.lon,b.lat,b.lon)}));
    const toC=pts.map((s,i)=>{const b=brng(s.lat,s.lon,c.lat,c.lon),d=dkm(s.lat,s.lon,c.lat,c.lon);return{...s,sym:SYMS[i],b,d,...d16(b)};});
    const am=pts.find(s=>s.id==="amagi"||s.id==="mt_amagi");
    const fa=am?{b:brng(am.lat,am.lon,c.lat,c.lon),d:dkm(am.lat,am.lon,c.lat,c.lon),...d16(brng(am.lat,am.lon,c.lat,c.lon))}:null;
    setResult({pts,c,edges,toC,fa});
  },[slots]);

  const filtered=useMemo(()=>{
    // 関・峠・岬を統合カテゴリ「関」「峠」「岬」で絞る
    const matchCat=s=>tab==="関"?["関","峠","岬"].includes(s.cat):s.cat===tab;
    const base=q?"":ALL.filter(matchCat);
    if(!q)return base;
    const lq=q.toLowerCase();
    return ALL.filter(s=>s.name.toLowerCase().includes(lq)||(s.pref&&s.pref.includes(q))||(s.myth&&s.myth.toLowerCase().includes(lq))||s.cat.includes(q));
  },[tab,q]);

  const prefGroups=useMemo(()=>{
    if(tab!=="SV"||q)return null;
    const m={};filtered.forEach(s=>{if(!m[s.pref])m[s.pref]=[];m[s.pref].push(s);});return m;
  },[tab,q,filtered]);

  const pick=(sym,id)=>{setSlots(p=>({...p,[sym]:id}));setActive(null);setQ("");};

  return(
    <div style={{fontFamily:"sans-serif",background:"#080e1d",color:"#e2e8f0",minHeight:"100vh",padding:14}}>
      <div style={{maxWidth:940,margin:"0 auto"}}>

        <div style={{textAlign:"center",marginBottom:16}}>
          <h1 style={{fontSize:18,color:"#fbbf24",margin:0,letterSpacing:2}}>⛩ 三種の神器 三角形計算器 v4</h1>
          <p style={{fontSize:11,color:"#475569",margin:"4px 0 0"}}>SV・山・川・湖・関・峠・岬・古墳・神社・遺跡（307件）× 神話情報付き</p>
        </div>

        {/* スロット */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
          {SYMS.map(sym=>{
            const site=get(slots[sym]),s=SS[sym],open=active===sym;
            return(
              <div key={sym} onClick={()=>{setActive(open?null:sym);setQ("");}}
                style={{background:open?"#1a2744":"#111827",border:`2px solid ${s.bg}`,borderRadius:10,padding:"10px 12px",cursor:"pointer"}}>
                <div style={{fontSize:11,color:s.bg,fontWeight:"bold",marginBottom:2}}>{s.em} {sym}</div>
                <div style={{fontSize:13,color:"#f1f5f9",fontWeight:"bold",lineHeight:1.3}}>{site?site.name:"—"}</div>
                {site&&<div style={{fontSize:10,color:"#475569",marginTop:2}}>{site.lat.toFixed(3)}N {site.lon.toFixed(3)}E</div>}
                {site?.myth&&<div style={{fontSize:9,color:"#64748b",marginTop:3,lineHeight:1.4}}>{site.myth.slice(0,45)}…</div>}
                <div style={{fontSize:9,color:"#334155",marginTop:3}}>{open?"▲ 閉じる":"▼ 変更"}</div>
              </div>
            );
          })}
        </div>

        {/* 選択パネル */}
        {active&&(
          <div style={{background:"#0d1829",border:"1px solid #1e3a5f",borderRadius:12,padding:14,marginBottom:16}}>
            <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
              <span style={{color:SS[active].bg,fontWeight:"bold",fontSize:12}}>{SS[active].em} {active}</span>
              <input value={q} onChange={e=>setQ(e.target.value)}
                placeholder="名前・神話・都道府県・[記紀][岩戸]で横断検索…"
                style={{flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"5px 10px",color:"#e2e8f0",fontSize:12,outline:"none"}}/>
              {q&&<button onClick={()=>setQ("")} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:14}}>✕</button>}
            </div>
            {!q&&(
              <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
                {CATS.map(c=>(
                  <button key={c.key} onClick={()=>setTab(c.key)}
                    style={{background:tab===c.key?c.color:"#1e293b",color:tab===c.key?"#080e1d":"#94a3b8",
                      border:`1px solid ${tab===c.key?c.color:"#334155"}`,borderRadius:5,padding:"3px 8px",fontSize:10,cursor:"pointer",fontWeight:tab===c.key?"bold":"normal"}}>
                    {c.label}
                  </button>
                ))}
              </div>
            )}
            <div style={{maxHeight:290,overflowY:"auto"}}>
              {q?(
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {filtered.map(s=>(
                    <button key={s.id} onClick={()=>pick(active,s.id)}
                      style={{background:slots[active]===s.id?"#fbbf24":"#1e293b",color:slots[active]===s.id?"#080e1d":"#e2e8f0",
                        border:"1px solid #334155",borderRadius:6,padding:"4px 9px",fontSize:11,cursor:"pointer",textAlign:"left",maxWidth:220}}>
                      <div style={{fontWeight:"bold"}}><span style={{fontSize:9,color:"#64748b",marginRight:3}}>{s.cat}</span>{s.name}</div>
                      {s.myth&&<div style={{fontSize:9,color:"#475569",marginTop:1}}>{s.myth.slice(0,40)}…</div>}
                    </button>
                  ))}
                  {!filtered.length&&<div style={{color:"#475569",fontSize:12}}>該当なし</div>}
                </div>
              ):tab==="SV"&&prefGroups?(
                Object.entries(prefGroups).map(([pref,cs])=>(
                  <div key={pref} style={{marginBottom:8}}>
                    <div style={{fontSize:10,color:"#475569",marginBottom:3}}>{pref}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {cs.map(s=>(
                        <button key={s.id} onClick={()=>pick(active,s.id)}
                          style={{background:slots[active]===s.id?"#60a5fa":"#1a2744",color:slots[active]===s.id?"#080e1d":"#bfdbfe",
                            border:"1px solid #1e3a5f",borderRadius:5,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
                          {s.name.replace(/SV$|SVセンター$/,"")}
                        </button>
                      ))}
                    </div>
                  </div>
                ))
              ):(
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {filtered.map(s=>(
                    <button key={s.id} onClick={()=>pick(active,s.id)}
                      style={{background:slots[active]===s.id?"#fbbf24":"#1e293b",color:slots[active]===s.id?"#080e1d":"#e2e8f0",
                        border:"1px solid #334155",borderRadius:6,padding:"4px 9px",fontSize:11,cursor:"pointer",textAlign:"left",maxWidth:220}}>
                      <div style={{fontWeight:"bold"}}>{s.name}</div>
                      {s.myth&&<div style={{fontSize:9,color:"#64748b",marginTop:1}}>{s.myth.slice(0,40)}…</div>}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* 結果 */}
        {result&&(
          <div style={{display:"grid",gap:12}}>
            <div style={{background:"#111827",border:"2px solid #fbbf24",borderRadius:12,padding:16}}>
              <div style={{fontSize:11,color:"#fbbf24",fontWeight:"bold",marginBottom:6}}>★ 三角形の重心</div>
              <div style={{fontSize:22,fontWeight:"bold",color:"#f1f5f9"}}>{result.c.lat.toFixed(4)}°N / {result.c.lon.toFixed(4)}°E</div>
              {result.fa&&(
                <div style={{marginTop:6,fontSize:12}}>
                  <span style={{color:"#64748b"}}>天城→重心: </span>
                  <span style={{color:"#fbbf24",fontWeight:"bold"}}>{result.fa.b.toFixed(1)}°（{result.fa.dir}、誤差{result.fa.err.toFixed(1)}°）</span>
                  <span style={{color:"#64748b",marginLeft:6}}>{result.fa.d.toFixed(0)}km</span>
                </div>
              )}
              <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
                <a href={`https://maps.gsi.go.jp/#12/${result.c.lat.toFixed(4)}/${result.c.lon.toFixed(4)}`} target="_blank" rel="noopener"
                  style={{fontSize:11,color:"#60a5fa",background:"#080e1d",padding:"4px 12px",borderRadius:5,textDecoration:"none"}}>🗾 地理院地図</a>
                <a href={`https://www.google.com/maps/@${result.c.lat.toFixed(4)},${result.c.lon.toFixed(4)},11z`} target="_blank" rel="noopener"
                  style={{fontSize:11,color:"#4ade80",background:"#080e1d",padding:"4px 12px",borderRadius:5,textDecoration:"none"}}>📍 Googleマップ</a>
              </div>
            </div>

            <div style={{background:"#111827",border:"1px solid #1e3a5f",borderRadius:12,padding:14}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:8,fontWeight:"bold"}}>各頂点 → 重心</div>
              {result.toC.map((t,i)=>{
                const s=SS[t.sym];
                return(
                  <div key={i} style={{padding:"6px 0",borderBottom:"1px solid #080e1d"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{background:s.bg,color:s.txt,borderRadius:4,padding:"2px 6px",fontSize:10,fontWeight:"bold",whiteSpace:"nowrap"}}>{s.em}{t.sym}</span>
                      <span style={{fontSize:12,color:"#cbd5e1",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
                      <span style={{fontSize:12,color:"#fbbf24",fontWeight:"bold",whiteSpace:"nowrap"}}>{t.b.toFixed(1)}°</span>
                      <span style={{fontSize:11,color:"#60a5fa",whiteSpace:"nowrap"}}>({t.dir}±{t.err.toFixed(1)}°)</span>
                      <span style={{fontSize:11,color:"#475569",whiteSpace:"nowrap"}}>{t.d.toFixed(0)}km</span>
                    </div>
                    {t.myth&&<div style={{fontSize:9,color:"#475569",marginTop:3,marginLeft:8,paddingLeft:8,borderLeft:"2px solid #1e3a5f"}}>{t.myth.slice(0,70)}…</div>}
                  </div>
                );
              })}
            </div>

            <div style={{background:"#111827",border:"1px solid #1e3a5f",borderRadius:12,padding:14}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:8,fontWeight:"bold"}}>辺の方位・距離</div>
              {result.edges.map((e,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #080e1d",fontSize:12}}>
                  <span style={{color:"#94a3b8",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.from.replace(/SV$|SVセンター$/,"")} → {e.to.replace(/SV$|SVセンター$/,"")}</span>
                  <span style={{color:"#fbbf24",whiteSpace:"nowrap",marginLeft:8}}>{e.b.toFixed(1)}° / {e.d.toFixed(0)}km</span>
                </div>
              ))}
            </div>

            {result.fa&&(
              <div style={{background:"#080e1d",border:"1px solid #1e293b",borderRadius:10,padding:12}}>
                <div style={{fontSize:11,color:"#475569",marginBottom:6}}>天城岩戸ログ 方位照合</div>
                {[{n:"ストーンヘンジ",b:336.7},{n:"富士山・宮下文書高天原",b:331.8},{n:"戸隠山（NNW 誤差0.4°）",b:337.9},{n:"籠神社（天火明命元宮）",b:286.0},{n:"今回の重心",b:result.fa.b,hi:true}]
                  .map(r=>(
                    <div key={r.n} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:r.hi?"#fbbf24":"#475569",fontWeight:r.hi?"bold":"normal",padding:"2px 0"}}>
                      <span>{r.n}</span><span>{r.b.toFixed(1)}°</span>
                    </div>
                  ))}
              </div>
            )}
          </div>
        )}
        <div style={{fontSize:9,color:"#1e293b",textAlign:"center",marginTop:16}}>大円航路初期方位角・球面重心 / 天城岩戸ログ連動 v4</div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
