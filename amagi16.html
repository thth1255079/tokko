const OVERSEAS_REGIONS=['台湾','アメリカ','カナダ','メキシコ','ブラジル','ウルグアイ','コンゴ','アンゴラ','フランス','韓国','タイ','オランダ','イギリス','ドイツ','フィリピン','オーストラリア'];

function getNearSacred(bearing,range=10){return SACRED.filter(s=>{let d=Math.abs(s.b-bearing);if(d>180)d=360-d;return d<=range;}).sort((a,b)=>{let da=Math.abs(a.b-bearing);if(da>180)da=360-da;let db=Math.abs(b.b-bearing);if(db>180)db=360-db;return da-db;});}
function tagClass(type){return{god:'tg',kofun:'tk',legend:'tl',shrine:'ts'}[type]||'tg';}
let tableData=[],sortCol=1,sortAsc=true,currentRegion='all';
function buildTableData(){tableData=CENTERS.map(c=>{const b=calcB(AM.lat,AM.lon,c.lat,c.lon);const di=calcD(AM.lat,AM.lon,c.lat,c.lon);const d=dir16(b);return{...c,bearing:b,dist:di,dir:d.name,error:d.error};});}
function isOverseas(region){return OVERSEAS_REGIONS.includes(region);}
function renderTable(){
  let data=[...tableData];
  if(currentRegion==='海外'){data=data.filter(r=>isOverseas(r.region));}
  else if(currentRegion!=='all'){data=data.filter(r=>r.region===currentRegion);}
  data.sort((a,b)=>{const v=sortAsc?1:-1;if(sortCol===0)return a.name.localeCompare(b.name,'ja')*v;if(sortCol===1)return(a.bearing-b.bearing)*v;if(sortCol===3)return(a.dist-b.dist)*v;return 0;});
  const tbody=document.getElementById('tbody1');tbody.innerHTML='';
  data.forEach((r,i)=>{
    const color=DIR_COLOR[r.dir]||'#777';const nearby=getNearSacred(r.bearing,12);const uid=`dr-${i}`;
    const overseas=isOverseas(r.region);
    const starNote=STAR_NOTES[r.name]||'';
    const tagsHtml=nearby.slice(0,4).map(s=>{let d=Math.abs(s.b-r.bearing);if(d>180)d=360-d;return`<span class="tag ${tagClass(s.type)}">${s.name}（${d.toFixed(1)}°差）</span>`;}).join('');
    const starHtml=starNote?`<span class="tag tw">${starNote}</span>`:'';
    const tr=document.createElement('tr');
    if(overseas)tr.className='world-row';
    tr.innerHTML=`<td><strong>${r.name}</strong><br><span style="font-size:11px;color:${overseas?'#4080c0':'#888'}">${r.region}</span></td><td><strong style="font-size:15px">${r.bearing.toFixed(1)}°</strong></td><td><span class="dir-badge" style="background:${color}">${r.dir}</span></td><td>${r.dist.toFixed(0)}km</td><td><div class="tags">${starHtml}${tagsHtml||(!starNote?'<span style="color:#aaa;font-size:11px">—</span>':'')}</div></td><td><button class="detail-btn" onclick="toggleDetail('${uid}')">詳細</button></td>`;
    tbody.appendChild(tr);
    const allNearby=getNearSacred(r.bearing,12);
    const gods=allNearby.filter(s=>s.type==='god');const shrines=allNearby.filter(s=>s.type==='shrine');const kofun=allNearby.filter(s=>s.type==='kofun');const legends=allNearby.filter(s=>s.type==='legend');
    function listItems(arr){if(!arr.length)return'（なし）';return arr.map(s=>{let d=Math.abs(s.b-r.bearing);if(d>180)d=360-d;return`<div style="margin-bottom:4px">・<strong>${s.name}</strong>（方位角${s.b}°、差${d.toFixed(1)}°）<br><span style="color:#555;font-size:11px;padding-left:12px">${s.note}</span></div>`;}).join('');}
    const dtr=document.createElement('tr');dtr.className='detail-row';dtr.id=uid;
    const starBlock=starNote?`<div class="star-note">${starNote}</div>`:'';
    dtr.innerHTML=`<td class="detail-cell" colspan="6"><div style="font-weight:700;color:#b8860b;margin-bottom:8px">${r.name}　天城から ${r.bearing.toFixed(2)}° (${r.dir}) / ${r.dist.toFixed(0)}km</div>${starBlock}<div class="ds"><div class="dt">神（同方向に伝わる）</div>${listItems(gods)}</div><div class="ds"><div class="dt">神社（同方向）</div>${listItems(shrines)}</div><div class="ds"><div class="dt">古墳（ライン±10°上）</div>${listItems(kofun)}</div><div class="ds"><div class="dt">伝説・聖地（同方向）</div>${listItems(legends)}</div></td>`;
    tbody.appendChild(dtr);
  });
}
function toggleDetail(uid){document.getElementById(uid).classList.toggle('open');}
function sortTable(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}renderTable();}
function buildFilters(){
  const japanRegions=['all','北海道','東北','関東','中部','近畿','中国','九州'];
  const worldRegions=['海外',...OVERSEAS_REGIONS];
  const wrap=document.getElementById('filters1');
  japanRegions.forEach(r=>{const btn=document.createElement('button');btn.className='f-btn'+(r==='all'?' active':'');btn.textContent=r==='all'?'すべて':r;btn.onclick=()=>{document.querySelectorAll('#filters1 .f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentRegion=r;renderTable();};wrap.appendChild(btn);});
  // 区切り
  const sep=document.createElement('span');sep.textContent=' | ';sep.style.color='#ccc';wrap.appendChild(sep);
  worldRegions.forEach(r=>{const btn=document.createElement('button');btn.className='f-btn world';btn.textContent=r;btn.onclick=()=>{document.querySelectorAll('#filters1 .f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentRegion=r;renderTable();};wrap.appendChild(btn);});
}
function switchTab(id,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');btn.classList.add('active');}
function analyzeCustom(){
  const la=parseFloat(document.getElementById('lat').value),lo=parseFloat(document.getElementById('lon').value),nm=document.getElementById('pname').value.trim()||`${la}N,${lo}E`;
  if(isNaN(la)||isNaN(lo)){alert('緯度・経度を入力してください');return;}
  const b=calcB(AM.lat,AM.lon,la,lo),di=calcD(AM.lat,AM.lon,la,lo),d=dir16(b),color=DIR_COLOR[d.name]||'#777';
  const nearby=getNearSacred(b,10);
  const gods=nearby.filter(s=>s.type==='god'),shrines=nearby.filter(s=>s.type==='shrine'),kofun=nearby.filter(s=>s.type==='kofun'),legends=nearby.filter(s=>s.type==='legend');
  function rcList(arr){if(!arr.length)return'<span style="color:#aaa;font-size:11px">（なし）</span>';return'<div class="tags">'+arr.map(s=>{let dif=Math.abs(s.b-b);if(dif>180)dif=360-dif;return`<span class="tag ${tagClass(s.type)}">${s.name}（${dif.toFixed(1)}°差）</span>`;}).join('')+'</div>';}
  const rc=document.getElementById('rc');
  rc.innerHTML=`<div class="rc-head"><div class="rc-val">${b.toFixed(2)}°</div><div class="rc-dir"><span class="dir-badge" style="background:${color}">${d.name}</span></div><div class="rc-sub">${nm} ／ 天城から ${di.toFixed(0)}km ／ 16方位中心から誤差 ${d.error.toFixed(1)}°</div></div><div class="rc-body"><div class="rc-sec"><div class="rc-sec-title">神（同方向に伝わる）</div>${rcList(gods)}</div><div class="rc-sec"><div class="rc-sec-title">神社（同方向）</div>${rcList(shrines)}</div><div class="rc-sec"><div class="rc-sec-title">古墳（ライン±10°上）</div>${rcList(kofun)}</div><div class="rc-sec"><div class="rc-sec-title">伝説・聖地（同方向）</div>${rcList(legends)}</div></div>`;
  rc.classList.add('show');rc.scrollIntoView({behavior:'smooth'});
}
window.addEventListener('DOMContentLoaded',()=>{buildTableData();buildFilters();renderTable();});
</script>
