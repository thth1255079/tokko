// ── 計算 ──
const DEG = Math.PI / 180;
const brng = (a,b,c,d) => { const[f1,f2,l1,l2]=[a,c,b,d].map(x=>x*DEG),dl=l2-l1,x=Math.sin(dl)*Math.cos(f2),y=Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl);return((Math.atan2(x,y)/DEG)+360)%360; };
const dkm  = (a,b,c,d) => { const R=6371,[f1,f2,l1,l2]=[a,c,b,d].map(x=>x*DEG),e=Math.sin((f2-f1)/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin((l2-l1)/2)**2;return R*2*Math.asin(Math.sqrt(e)); };
const ctr  = pts => { const s=pts.map(([a,b])=>{const f=a*DEG,l=b*DEG;return[Math.cos(f)*Math.cos(l),Math.cos(f)*Math.sin(l),Math.sin(f)];}); const[cx,cy,cz]=s.reduce(([ax,ay,az],[x,y,z])=>[ax+x,ay+y,az+z],[0,0,0]).map(v=>v/s.length); return{lat:Math.atan2(cz,Math.sqrt(cx**2+cy**2))/DEG,lon:Math.atan2(cy,cx)/DEG}; };
const d16  = deg => { const D=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"],i=Math.round(deg/22.5)%16;let e=Math.abs(deg-i*22.5);if(e>180)e=360-e;return{dir:D[i],err:e}; };

const IWATO = [
  {name:"ストーンヘンジ",          b:336.7},
  {name:"戸隠山（天岩戸）",        b:337.9},

const PRESETS = [
  {label:"🚧 陸の三関",       ids:["suzuka","fuwa","arahaka"]},
  {label:"🌊 消された海の関", ids:["sagaseki","noto","nezugaseki"]},
  {label:"🏙 東北三角形",     ids:["sendai","shinjo","ichinoseki"]},
  {label:"⛰ 峠の三関",       ids:["hakone","usui","ashigara"]},
];

const SLOT_COLORS = ["#f43f5e","#38bdf8","#4ade80"];

function parseCoord(s) {
  s = (s||"").trim();
  const m1 = s.match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
  if (m1) return { lat: parseFloat(m1[1]), lon: parseFloat(m1[2]) };
  return null;
}

function App() {
  const initSlots = () => ["suzuka","fuwa","arahaka"].map(id => ({
    site: DB.find(x => x.id === id), input: ""
  }));

  const [slots, setSlots] = useState(initSlots);
  const [q, setQ]         = useState(["","",""]);
  const [open, setOpen]   = useState(null);
  const [tab, setTab]     = useState("関");

  const updSlot = (i, patch) =>
    setSlots(prev => prev.map((s,j) => j===i ? {...s,...patch} : s));

  const pickSite = (i, site) => {
    updSlot(i, {site, input:""});
    setOpen(null);
    setQ(prev => { const n=[...prev]; n[i]=""; return n; });
  };

  const handleInput = (i, val) => {
    const p = parseCoord(val);
    if (p) {
      updSlot(i, {input:val, site:{id:"custom",name:`(${p.lat.toFixed(3)}, ${p.lon.toFixed(3)})`,lat:p.lat,lon:p.lon,cat:"座標入力",myth:""}});
    } else {
      updSlot(i, {input:val});
    }
  };

  const applyPreset = (ids) => {
    setSlots(ids.map(id => ({site: DB.find(x=>x.id===id), input:""})));
    setOpen(null);
  };

  const pts = slots.map(s => s.site).filter(Boolean);
  const ready = pts.length === 3;

  const result = useMemo(() => {
    if (!ready) return null;
    const c = ctr(pts.map(s => [s.lat, s.lon]));
    const edges = [[pts[0],pts[1]],[pts[1],pts[2]],[pts[2],pts[0]]].map(([a,b])=>({
      from:a.name, to:b.name,
      b:brng(a.lat,a.lon,b.lat,b.lon),
      d:dkm(a.lat,a.lon,b.lat,b.lon)
    }));
    const toC = pts.map((s,i) => {
      const b=brng(s.lat,s.lon,c.lat,c.lon), d=dkm(s.lat,s.lon,c.lat,c.lon);
      return {...s, b, d, ...d16(b)};
    });
    const am = DB.find(x=>x.id==="amagi");
    const fa = {
      b: brng(am.lat,am.lon,c.lat,c.lon),
      d: dkm(am.lat,am.lon,c.lat,c.lon),
      ...d16(brng(am.lat,am.lon,c.lat,c.lon))
    };
    return {c, edges, toC, fa};
  }, [slots]);

  const getFiltered = (i) => {
    const qq = (q[i]||"").toLowerCase();
    if (!qq) return DB.filter(s => s.cat === tab);
    return DB.filter(s =>
      s.name.toLowerCase().includes(qq) ||
      (s.myth && s.myth.toLowerCase().includes(qq)) ||
      s.cat.includes(qq)
    );
  };

  // ── スタイル ──
  const S = {
    root:   {fontFamily:"sans-serif",background:"#080e1d",color:"#e2e8f0",minHeight:"100vh",padding:14},
    wrap:   {maxWidth:860,margin:"0 auto"},
    grid3:  {display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14},
    card:   {background:"#111827",border:"1px solid #1e3a5f",borderRadius:12,padding:14},
    result: {background:"#111827",border:"2px solid #f43f5e",borderRadius:12,padding:16},
    panel:  {background:"#0d1829",border:"1px solid #1e3a5f",borderRadius:12,padding:14,marginBottom:16},
  };

  return React.createElement("div", {style:S.root},
    React.createElement("div", {style:S.wrap},

      // タ이틀
      React.createElement("div", {style:{textAlign:"center",marginBottom:12}},
        React.createElement("h1", {style:{fontSize:18,color:"#f43f5e",margin:0,letterSpacing:2}}, "🚧 関・峠・岬 三角形計算器"),
        React.createElement("p",  {style:{fontSize:11,color:"#475569",marginTop:4}}, "地名を選ぶ / 座標を直打ち → 3点の重心と天城岩戸ログ照合")
      ),

      // プリセット
      React.createElement("div", {style:{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:14}},
        PRESETS.map(p =>
          React.createElement("button", {
            key:p.label,
            onClick:()=>applyPreset(p.ids),
            style:{background:"#111827",border:"1px solid #334155",borderRadius:6,
              padding:"5px 12px",color:"#94a3b8",fontSize:11,cursor:"pointer"}
          }, p.label)
        )
      ),

      // スロット
      React.createElement("div", {style:S.grid3},
        slots.map((s, i) =>
          React.createElement("div", {key:i},
            // カード
            React.createElement("div", {
              onClick:()=>setOpen(open===i?null:i),
              style:{background:open===i?"#1a1030":"#111827",
                border:`2px solid ${SLOT_COLORS[i]}`,
                borderRadius:10,padding:"10px 12px",cursor:"pointer",marginBottom:6}
            },
              React.createElement("div",{style:{fontSize:10,color:SLOT_COLORS[i],fontWeight:"bold",marginBottom:3}},`点 ${i+1}`),
              React.createElement("div",{style:{fontSize:13,color:"#f1f5f9",fontWeight:"bold",lineHeight:1.3}},
                s.site ? s.site.name : "未選択"
              ),
              s.site && React.createElement("div",{style:{fontSize:10,color:"#475569",marginTop:2}},
                `${s.site.lat.toFixed(4)}N  ${s.site.lon.toFixed(4)}E  `,
                React.createElement("span",{style:{color:"#334155"}}, s.site.cat)
              ),
              s.site?.myth && React.createElement("div",{style:{fontSize:9,color:"#64748b",marginTop:3,lineHeight:1.4}},
                s.site.myth.slice(0,50)+"…"
              ),
              React.createElement("div",{style:{fontSize:9,color:"#334155",marginTop:3}},
                open===i?"▲ 閉じる":"▼ 変更"
              )
            ),
            // 座標入力
            React.createElement("input", {
              value: s.input,
              onChange: e=>handleInput(i,e.target.value),
              placeholder:"座標直打ち: 34.920, 139.018",
              style:{width:"100%",background:"#0d1829",
                border:`1px solid ${parseCoord(s.input)?"#4ade80":"#1e293b"}`,
                borderRadius:6,padding:"5px 8px",color:"#e2e8f0",fontSize:11,outline:"none"}
            })
          )
        )
      ),

      // ピッカー
      open !== null && React.createElement("div", {style:S.panel},
        // ヘッダー
        React.createElement("div",{style:{display:"flex",gap:8,marginBottom:10,alignItems:"center"}},
          React.createElement("span",{style:{color:SLOT_COLORS[open],fontWeight:"bold",fontSize:12}},`点 ${open+1} を選択`),
          React.createElement("input",{
            value:q[open],
            onChange:e=>{const n=[...q];n[open]=e.target.value;setQ(n);},
            placeholder:"名前・神話・[岩戸][記紀] で検索…",
            style:{flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:6,
              padding:"5px 10px",color:"#e2e8f0",fontSize:12,outline:"none"}
          }),
          q[open] && React.createElement("button",{
            onClick:()=>{const n=[...q];n[open]="";setQ(n);},
            style:{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:14}
          },"✕")
        ),
        // カテゴリタブ
        !q[open] && React.createElement("div",{style:{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}},
          CATS.map(c =>
            React.createElement("button",{
              key:c.key, onClick:()=>setTab(c.key),
              style:{background:tab===c.key?c.color:"#1e293b",
                color:tab===c.key?"#080e1d":"#94a3b8",
                border:`1px solid ${tab===c.key?c.color:"#334155"}`,
                borderRadius:5,padding:"3px 9px",fontSize:10,cursor:"pointer",
                fontWeight:tab===c.key?"bold":"normal"}
            }, c.label)
          )
        ),
        // リスト
        React.createElement("div",{style:{maxHeight:260,overflowY:"auto",display:"flex",flexWrap:"wrap",gap:5}},
          getFiltered(open).map(s =>
            React.createElement("button",{
              key:s.id, onClick:()=>pickSite(open,s),
              style:{background:slots[open]?.site?.id===s.id?"#fbbf24":"#1e293b",
                color:slots[open]?.site?.id===s.id?"#080e1d":"#e2e8f0",
                border:"1px solid #334155",borderRadius:6,
                padding:"5px 10px",fontSize:11,cursor:"pointer",textAlign:"left",maxWidth:230}
            },
              React.createElement("div",{style:{fontWeight:"bold"}},
                React.createElement("span",{style:{fontSize:9,color:"#64748b",marginRight:4}},s.cat),
                s.name
              ),
              s.myth && React.createElement("div",{style:{fontSize:9,color:"#64748b",marginTop:2}},
                s.myth.slice(0,38)+"…"
              )
            )
          )
        )
      ),

      // 結果
      ready && result && React.createElement("div",{style:{display:"grid",gap:12}},

        // 重心
        React.createElement("div",{style:S.result},
          React.createElement("div",{style:{fontSize:11,color:"#f43f5e",fontWeight:"bold",marginBottom:6}},"★ 三角形の重心"),
          React.createElement("div",{style:{fontSize:24,fontWeight:"bold",color:"#f1f5f9"}},
            `${result.c.lat.toFixed(4)}°N / ${result.c.lon.toFixed(4)}°E`
          ),
          React.createElement("div",{style:{marginTop:6,fontSize:12}},
            React.createElement("span",{style:{color:"#64748b"}},"天城（原点）→重心: "),
            React.createElement("span",{style:{color:"#f43f5e",fontWeight:"bold"}},
              `${result.fa.b.toFixed(1)}°（${result.fa.dir}、誤差${result.fa.err.toFixed(1)}°）`
            ),
            React.createElement("span",{style:{color:"#64748b",marginLeft:6}},`${result.fa.d.toFixed(0)}km`)
          ),
          React.createElement("div",{style:{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}},
            React.createElement("a",{
              href:`https://maps.gsi.go.jp/#12/${result.c.lat.toFixed(4)}/${result.c.lon.toFixed(4)}`,
              target:"_blank",rel:"noopener",
              style:{fontSize:11,color:"#60a5fa",background:"#080e1d",padding:"4px 12px",borderRadius:5,textDecoration:"none"}
            },"🗾 地理院地図"),
            React.createElement("a",{
              href:`https://www.google.com/maps/@${result.c.lat.toFixed(4)},${result.c.lon.toFixed(4)},10z`,
              target:"_blank",rel:"noopener",
              style:{fontSize:11,color:"#4ade80",background:"#080e1d",padding:"4px 12px",borderRadius:5,textDecoration:"none"}
            },"📍 Googleマップ")
          )
        ),

        // 各点→重心
        React.createElement("div",{style:S.card},
          React.createElement("div",{style:{fontSize:11,color:"#64748b",marginBottom:8,fontWeight:"bold"}},"各点 → 重心"),
          result.toC.map((t,i) =>
            React.createElement("div",{key:i,style:{padding:"7px 0",borderBottom:"1px solid #080e1d"}},
              React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
                React.createElement("span",{style:{background:SLOT_COLORS[i],color:"#080e1d",borderRadius:4,
                  padding:"2px 7px",fontSize:10,fontWeight:"bold",whiteSpace:"nowrap"}},`点${i+1}`),
                React.createElement("span",{style:{fontSize:12,color:"#cbd5e1",flex:1,overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.name),
                React.createElement("span",{style:{fontSize:12,color:"#fbbf24",fontWeight:"bold",whiteSpace:"nowrap"}},
                  `${t.b.toFixed(1)}°`),
                React.createElement("span",{style:{fontSize:11,color:"#60a5fa",whiteSpace:"nowrap"}},
                  `(${t.dir} ±${t.err.toFixed(1)}°)`),
                React.createElement("span",{style:{fontSize:11,color:"#475569",whiteSpace:"nowrap"}},
                  `${t.d.toFixed(0)}km`)
              ),
              t.myth && React.createElement("div",{style:{fontSize:9,color:"#475569",marginTop:3,
                marginLeft:8,paddingLeft:8,borderLeft:"2px solid #1e3a5f"}},
                t.myth.slice(0,70)+"…"
              )
            )
          )
        ),

        // 辺
        React.createElement("div",{style:S.card},
          React.createElement("div",{style:{fontSize:11,color:"#64748b",marginBottom:8,fontWeight:"bold"}},"辺の方位・距離"),
          result.edges.map((e,i) =>
            React.createElement("div",{key:i,style:{display:"flex",justifyContent:"space-between",
              padding:"4px 0",borderBottom:"1px solid #080e1d",fontSize:12}},
              React.createElement("span",{style:{color:"#94a3b8",flex:1,overflow:"hidden",
                textOverflow:"ellipsis",whiteSpace:"nowrap"}},`${e.from} → ${e.to}`),
              React.createElement("span",{style:{color:"#fbbf24",whiteSpace:"nowrap",marginLeft:8}},
                `${e.b.toFixed(1)}° / ${e.d.toFixed(0)}km`)
            )
          )
        ),

        // 岩戸ログ照合
        React.createElement("div",{style:{background:"#080e1d",border:"1px solid #1e293b",borderRadius:10,padding:12}},
          React.createElement("div",{style:{fontSize:11,color:"#475569",marginBottom:6}},
            "天城岩戸ログ 方位照合（天城原点→重心）"
          ),
          [...IWATO,{name:"今回の重心",b:result.fa.b,hi:true}].map(r =>
            React.createElement("div",{key:r.name,style:{display:"flex",justifyContent:"space-between",
              fontSize:11,color:r.hi?"#f43f5e":"#475569",fontWeight:r.hi?"bold":"normal",padding:"2px 0"}},
              React.createElement("span",null,r.name),
              React.createElement("span",null,r.b.toFixed(1)+"°")
            )
          )
        )
      ),

      !ready && React.createElement("div",{style:{textAlign:"center",color:"#334155",fontSize:12,marginTop:24}},
        "3点を選ぶか座標を入力すると重心を計算します"
      ),

      React.createElement("div",{style:{fontSize:9,color:"#1e293b",textAlign:"center",marginTop:18}},
        "大円航路初期方位角・球面重心 / 天城岩戸ログ連動 — 関編"
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
