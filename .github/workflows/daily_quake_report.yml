# 天城地震レポート 自動実行ワークフロー
#
# 設置方法:
#   1. このファイルを、あなたのリポジトリの
#      .github/workflows/daily_quake_report.yml として保存する
#   2. amagi_quake_report.py をリポジトリのルート(または任意のフォルダ)に置く
#   3. 下記の `python amagi_quake_report.py ...` の行のパスを、
#      実際に置いた場所に合わせて調整する
#   4. GitHubにpushすれば、あとは毎日自動で実行される
#
# 実行結果は docs/quake_data.json に保存され、
# GitHub Pagesの docs/ フォルダを公開設定にしておけば、
# https://あなたのユーザー名.github.io/リポジトリ名/quake_viewer.html
# のようなURLでスマホから見られるようになる。

name: 天城地震レポート自動生成

on:
  schedule:
    # UTC基準。日本時間21:00に実行したい場合はUTC 12:00に設定
    - cron: '0 12 * * *'
  workflow_dispatch: {}   # 手動実行ボタンも使えるようにする

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 地震レポートを生成
        run: |
          mkdir -p docs
          python amagi_quake_report.py --days 1 --min-mag 1.0 \
            --json-out docs/quake_data.json \
            --out docs/quake_report.txt

      - name: 変更をコミット
        run: |
          git config user.name "amagi-quake-bot"
          git config user.email "actions@github.com"
          git add docs/quake_data.json docs/quake_report.txt
          git diff --quiet --cached || git commit -m "地震レポート自動更新 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
